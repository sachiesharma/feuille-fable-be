name: Keep Render awake

# Render's free tier spins the service down after ~15 minutes without traffic,
# making the next visitor wait up to a minute for a cold start. Pinging every
# 10 minutes keeps it warm. Scheduled workflows only run from the default
# branch (main).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the backend
        run: |
          curl --silent --show-error --max-time 90 --retry 2 \
            --write-out "HTTP %{http_code} in %{time_total}s\n" \
            --output /dev/null \
            https://feuille-fable-be.onrender.com/
